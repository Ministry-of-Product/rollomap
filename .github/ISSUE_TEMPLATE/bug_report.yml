name: Bug report
description: Report something that isn't working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please fill out the sections
        below so we can reproduce and fix it quickly.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
      placeholder: When I ..., I expected ..., but instead ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the problem?
      placeholder: |
        1. Run `...`
        2. Open `...`
        3. See error
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Which part of RolloMap?
      options:
        - API (packages/api)
        - MCP server (packages/mcp-server)
        - Webapp (packages/webapp)
        - Cloud sync
        - Ingest
        - Database / migrations
        - Not sure
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version (`node -v`), how you're running it (Docker vs Node), and the commit/version.
      placeholder: |
        - OS: macOS 14.5
        - Node: v20.x
        - Running via: docker compose / npm run dev
        - Commit/version: v0.1.0
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste any console output, API logs, or screenshots. **Redact any personal data first.**
      render: shell
    validations:
      required: false
